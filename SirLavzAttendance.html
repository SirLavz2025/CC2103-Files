 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SirLavz QR Attendance Application</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Tailwind CSS & FontAwesome Icons -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
    :root { color-scheme: light; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Plus Jakarta Sans', sans-serif;
        background: radial-gradient(circle at top left, #eef6ff 0%, #f8fbff 28%, #f4f7fb 60%, #eef2f7 100%);
        color: #0f172a;
        min-height: 100vh;
    }
    header {
        background: linear-gradient(135deg, #071a2f 0%, #0f3b6e 38%, #0f766e 100%);
        position: relative;
        overflow: hidden;
        border-bottom-left-radius: 28px;
        border-bottom-right-radius: 28px;
        box-shadow: 0 24px 50px rgba(15, 23, 42, 0.16);
    }
    header::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at top right, rgba(255,255,255,0.24), transparent 34%);
        pointer-events: none;
    }
    .bg-white {
        background: linear-gradient(135deg, rgba(255,255,255,0.96), rgba(248,250,255,0.9)) !important;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.8) !important;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08), inset 0 1px 0 rgba(255,255,255,0.75) !important;
    }
    .rounded-xl, .rounded-2xl { border-radius: 24px !important; }
    select {
        border-radius: 16px !important;
        background: rgba(248, 250, 252, 0.95) !important;
        border: 1px solid rgba(148, 163, 184, 0.28) !important;
    }
    footer {
        background: rgba(255,255,255,0.72);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid rgba(255,255,255,0.8);
    }
</style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col antialiased">

<!-- Header Section -->
<header class="bg-gradient-to-r from-green-800 to-green-700 text-white shadow-xl px-3 py-4">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-4 text-center md:text-left">
            <div class="p-2.5 bg-white/10 rounded-xl backdrop-blur-md w-fit inline-block">
                <img src="ccs.jpg" alt="CCS Logo" class="h-16 w-auto object-contain block" />
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-tight">SirLavz QR Attendance App</h1>
                <p class="text-xs text-slate-300 font-medium uppercase tracking-wider">LAGUNA UNIVERSITY - COLLEGE OF COMPUTING STUDIES</p>
            </div>
        </div>
        <div class="bg-white/10 border border-white/10 backdrop-blur-md px-5 py-2.5 rounded-xl text-center shadow-inner">
            <div id="liveClock" class="text-sm font-semibold text-sky-300 tracking-wide"><i class="fa-regular fa-clock mr-2"></i>Loading Time...</div>
        </div>
    </div>
</header>

<!-- Main Kiosk Wrapper -->
<main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 lg:p-8 flex items-center justify-center">

    <div class="w-full max-w-xl bg-white rounded-2xl border border-slate-200 shadow-xl overflow-hidden">
        <div class="bg-slate-900 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-3">
            <h2 class="text-base font-bold text-white flex items-center gap-2"><i class="fa-solid fa-camera text-sky-400"></i> Place QR Pass Near Camera</h2>
            <div class="flex items-center gap-2 w-full sm:w-auto">
                <select id="cameraSelection" class="bg-slate-800 text-slate-200 text-xs rounded-lg border border-slate-700 px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500 flex-1"></select>
                <button onclick="restartScanner()" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1 shadow-sm cursor-pointer"><i class="fa-solid fa-rotate"></i> Switch</button>
            </div>
        </div>

        <div class="p-8 flex flex-col items-center justify-center bg-linear-to-b from-slate-50 to-slate-100">
            <div id="scanner" class="w-full max-w-[320px] aspect-square bg-slate-950 rounded-xl overflow-hidden border-[6px] border-slate-300 shadow-inner transition-all duration-300"></div>
            <div class="mt-6 w-full text-center min-h-[60px] flex items-center justify-center px-4">
                <p id="scanStatus" class="text-xl font-bold tracking-tight transition-all duration-300"></p>
            </div>
        </div>
    </div>

</main>

<!-- Sticky Footer -->
<footer class="bg-white border-t border-slate-200 py-4 px-6 text-center text-xs text-slate-400 font-medium">
    <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-2">
        <div>&copy; SirLavz2026 | RONALD T. LAVA, MSIT</div>
        <div class="flex items-center gap-2 text-slate-500"><span class="h-1.5 w-1.5 bg-emerald-500 rounded-full animate-ping"></span>TERMINAL ACTIVE</div>
    </div>
</footer>

<script>
const sk="students", ak="attendance";
let students = [];
let attendance = [];
let html5QrCode;
let isProcessingScan = false;

function getTodayDate() {
    const now = new Date();
    const offset = now.getTimezoneOffset() * 60000;
    return (new Date(now - offset)).toISOString().split('T')[0];
}

function updateClock() {
    const now = new Date();
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
    document.getElementById('liveClock').innerHTML = `<i class="fa-regular fa-clock text-sky-400 mr-2"></i>` + now.toLocaleDateString('en-PH', options);
}
setInterval(updateClock, 1000);

function loadData() {
    students = JSON.parse(localStorage.getItem(sk)) || [];
    attendance = JSON.parse(localStorage.getItem(ak)) || [];
}

function speakMessage(text) {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    const voices = window.speechSynthesis.getVoices();
    const phVoice = voices.find(v => v.lang === 'en-PH' || v.lang.includes('tl-PH') || v.name.includes('Philippines'));
    if (phVoice) { msg.voice = phVoice; }
    msg.rate = 0.95;
    msg.pitch = 1.1;
    window.speechSynthesis.speak(msg);
}

function markAttendance(id) {
    if (isProcessingScan) return;
    loadData(); // Re-sync in case modifications were made in the Hub

    const scannerBox = document.getElementById("scanner");
    const status = document.getElementById("scanStatus");
    const student = students.find(s => s.id === id);
    isProcessingScan = true;

    if (!student) {
        scannerBox.className = "w-full max-w-[320px] aspect-square bg-slate-950 rounded-xl overflow-hidden border-[6px] border-red-500 shadow-lg shadow-red-100";
        status.className = "text-lg font-bold text-red-600 tracking-tight";
        status.innerHTML = `<i class="fa-solid fa-circle-xmark mr-2"></i> Unknown ID: ${id}`;
        speakMessage("Access denied. Registration credentials not detected.");
        setTimeout(() => { resetScannerFrame(); }, 3500);
        return;
    }

    let d = getTodayDate();
    let logTime = new Date().toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
    let recordIndex = attendance.findIndex(a => a.id === id && a.date === d);

    if (recordIndex === -1) {
        attendance.push({ id: id, date: d, timeIn: logTime, timeOut: "—" });
        localStorage.setItem(ak, JSON.stringify(attendance));

        scannerBox.className = "w-full max-w-[320px] aspect-square bg-slate-950 rounded-xl overflow-hidden border-[6px] border-emerald-500 shadow-lg shadow-emerald-100";
        status.className = "text-xl font-bold text-emerald-600 tracking-tight";
        status.innerHTML = `<i class="fa-solid fa-circle-check mr-2"></i> Time In: ${student.name}`;
        speakMessage(`Thank you, ${student.name}. Your time-in is recorded.`);
    } else {
        let record = attendance[recordIndex];
        if (record.timeOut !== "—") {
            scannerBox.className = "w-full max-w-[320px] aspect-square bg-slate-950 rounded-xl overflow-hidden border-[6px] border-amber-400 shadow-lg shadow-amber-100";
            status.className = "text-lg font-bold text-amber-600 tracking-tight";
            status.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2"></i> ${student.name} Already Logged`;
            speakMessage(`Hello, ${student.name}. Your daily verification log has already completed.`);
        } else {
            record.timeOut = logTime;
            attendance[recordIndex] = record;
            localStorage.setItem(ak, JSON.stringify(attendance));

            scannerBox.className = "w-full max-w-[320px] aspect-square bg-slate-950 rounded-xl overflow-hidden border-[6px] border-blue-500 shadow-lg shadow-blue-100";
            status.className = "text-xl font-bold text-blue-600 tracking-tight";
            status.innerHTML = `<i class="fa-solid fa-right-from-bracket mr-2"></i> Time Out: ${student.name}`;
            speakMessage(`Thank you, ${student.name}. Your time-out is recorded.`);
        }
    }

    setTimeout(() => { resetScannerFrame(); }, 3500);
}

function resetScannerFrame() {
    const scannerBox = document.getElementById("scanner");
    const status = document.getElementById("scanStatus");
    scannerBox.className = "w-full max-w-[320px] aspect-square bg-slate-950 rounded-xl overflow-hidden border-[6px] border-slate-300 shadow-inner";
    status.innerHTML = "";
    isProcessingScan = false;
}

async function initScanner() {
    try {
        const devices = await Html5Qrcode.getCameras();
        if (devices && devices.length) {
            cameraSelection.innerHTML = devices.map(device => `<option value="${device.id}">${device.label}</option>`).join("");
            startScanner(devices[0].id);
        }
    } catch (err) { console.error("Camera detection error:", err); }
}

function startScanner(cameraId) {
    if (html5QrCode) {
        html5QrCode.stop().then(() => attachScanner(cameraId)).catch(() => attachScanner(cameraId));
    } else { attachScanner(cameraId); }
}

function attachScanner(cameraId) {
    html5QrCode = new Html5Qrcode("scanner");
    html5QrCode.start(cameraId, {fps: 15, qrbox: 220}, markAttendance, () => {});
}

function restartScanner() { startScanner(cameraSelection.value); }

window.onload = () => {
    if ('speechSynthesis' in window) { window.speechSynthesis.getVoices(); }
    updateClock();
    loadData();
    initScanner();
};
</script>
</body>
</html>
